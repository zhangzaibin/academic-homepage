short_bio: >-
  <p>
    I am Zaibin Zhang, a Ph.D. candidate at
    <a href="https://www.dlut.edu.cn/" target="_blank">Dalian University of Technology</a>,
    working on Multi-Agent Systems, Multimodal Agents, Reinforcement Learning, and Embodied/VLA Agents.
    I have visited the Torr Vision Group at the
    <a href="https://www.ox.ac.uk/" target="_blank">University of Oxford</a>
    and worked with Shanghai Artificial Intelligence Laboratory and CAMEL-AI on agent research and open-source systems.
    My work includes <a href="https://arxiv.org/abs/2401.11880" target="_blank">PsySafe</a>, which received the ACL 2024 Outstanding Paper Award,
    <a href="https://github.com/camel-ai/oasis" target="_blank">OASIS</a>, a million-scale agent society simulation platform with 4.8k+ GitHub stars,
    and recent efforts such as <a href="https://github.com/zhangzaibin/spagent" target="_blank">Think3D</a>, MA-VLA, and CoMAS,
    focusing on spatial reasoning, multi-agent collaboration, agent self-evolution, and RL-based training for next-generation intelligent agents.
  </p>

